version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: erp_educativa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend/static:/app/static
      - ./backend/media:/app/media
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - API_PROXY_TARGET=http://backend:8000
    # In production, we should serve built static files via Nginx, 
    # but for simplicity in this setup, we keep the node server or use a multi-stage build.
    # Assuming the current Dockerfile runs 'npm run dev' or 'serve'. 
    # For true production, we'd build static and serve via Nginx only.
    # PROD TWEAK: Using the existing dev setup but with restart policy for now.

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./backend/static:/app/static
      - ./backend/media:/app/media
    depends_on:
      - backend
      - frontend

volumes:
  db_data:
