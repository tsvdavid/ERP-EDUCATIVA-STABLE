<!doctype html>
<html lang="en">

<head>
  <script>
    window.addEventListener('error', function(e) {
      var div = document.createElement('div');
      div.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#f87171;padding:40px;z-index:99999;font-family:monospace;overflow:auto;";
      div.innerHTML = "<h1>FRONTEND FATAL ERROR</h1><p>The application failed to initialize.</p><hr/><pre>" + e.message + "\n" + e.filename + ":" + e.lineno + ":" + e.colno + "\n\nStack: " + (e.error ? e.error.stack : 'N/A') + "</pre>";
      document.body.appendChild(div);
    });
    console.log("EARLY ERROR HANDLER READY");
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d32f2f" />
  <link rel="manifest" href="/manifest.json?v=3" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>Eduka360 Pro | REFRESHED</title>
  
  <script>
    // PURGA GLOBAL DEFINITIVA - v8
    // Este script se ejecuta antes que nada para limpiar caches corruptos en móviles.
    (function() {
      console.log("[PWA] Iniciando Purga Global de Seguridad...");
      
      // 1. Desregistrar todos los Service Workers inmediatamente
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister().then(() => {
              console.log("[PWA] Service Worker eliminado.");
              window.location.reload(); // Recargar para asegurar carga desde red
            });
          }
        });
      }

      // 2. Borrar todas las bases de datos de Cache
      if ('caches' in window) {
        caches.keys().then(names => {
          Promise.all(names.map(name => caches.delete(name))).then(() => {
            console.log("[PWA] Caches de navegador limpiados.");
          });
        });
      }
    })();
  </script>

  <script>
    // Solo registramos el instalador si NO hay errores previos y tras la limpieza.
    // Pero por ahora lo dejamos desactivado para asegurar que la web cargue bien para todos.
    console.log("[PWA] Modo de recuperación activo. Instalador pausado.");
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
